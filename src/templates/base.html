<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orquestador Tableau Prep</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6fb; }

    .sidebar {
      width: 230px;
      min-height: 100vh;
      background: #16213e;
      flex-shrink: 0;
    }
    .sidebar .brand {
      color: #4fc3f7;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .3px;
    }
    .sidebar .brand i { color: #e94560; }
    .sidebar .nav-link {
      color: #8da9c4;
      border-radius: 6px;
      padding: .5rem .85rem;
      font-size: .9rem;
      transition: background .15s;
    }
    .sidebar .nav-link:hover { background: #1a2a4a; color: #fff; }
    .sidebar .nav-link.active { background: #0f3460; color: #fff; }
    .sidebar .nav-link i { width: 18px; }

    .main { flex: 1; padding: 2rem; min-width: 0; }

    .card { border: none; box-shadow: 0 1px 6px rgba(0,0,0,.07); border-radius: 10px; }
    .card-header { background: #fff; font-weight: 600; border-bottom: 1px solid #eef0f4; }

    .badge-exitoso   { background: #198754; }
    .badge-fallido   { background: #dc3545; }
    .badge-en_proceso { background: #fd7e14; }
    .badge-cancelado { background: #6c757d; }

    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .5px; color: #6c757d; }
    .table td { vertical-align: middle; font-size: .9rem; }

    .stat-card { border-radius: 10px; padding: 1.2rem 1.5rem; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex">

  <!-- Sidebar -->
  <nav class="sidebar p-3 d-flex flex-column gap-1">
    <div class="brand mb-4 d-flex align-items-center gap-2 px-1">
      <i class="bi bi-diagram-3-fill fs-5"></i>
      <span>Tableau Prep<br><small class="fw-normal text-secondary" style="font-size:.7rem">Orquestador</small></span>
    </div>

    <ul class="nav flex-column gap-1">
      <li><a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-2"></i>Dashboard
      </a></li>
      <li><a href="/flows" class="nav-link {% if active == 'flows' %}active{% endif %}">
        <i class="bi bi-play-circle me-2"></i>Flows
      </a></li>
      <li><a href="/historial" class="nav-link {% if active == 'historial' %}active{% endif %}">
        <i class="bi bi-clock-history me-2"></i>Historial
      </a></li>
      <li><a href="/logs" class="nav-link {% if active == 'logs' %}active{% endif %}">
        <i class="bi bi-terminal me-2"></i>Logs
      </a></li>
      <li><a href="/configuracion" class="nav-link {% if active == 'config' %}active{% endif %}">
        <i class="bi bi-gear me-2"></i>Configuración
      </a></li>
    </ul>
  </nav>

  <!-- Main -->
  <div class="main">
    {% if mensaje %}
      {% if 'Error' in mensaje %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ mensaje }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% else %}
      <div class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>{{ mensaje }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
